<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeQuito - Seguridad Comunitaria</title>
    <style>
        /* DISEÑO DE FONDO Y CONTENEDOR */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            background-attachment: fixed;
        }

        .container { 
            width: 90%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.98); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center;
        }

        h2 { color: #1e3c72; margin-bottom: 5px; font-size: 28px; }
        p.subtitle { color: #555; margin-bottom: 25px; font-size: 14px; font-weight: 500; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            background: #fdfdfd;
        }

        button.principal { 
            width: 100%; 
            padding: 16px; 
            background: #1e3c72; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px;
            transition: 0.3s;
        }

        /* BOTONES DE ALERTA */
        .btn-alerta { 
            width: 100%; 
            padding: 18px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 15px; 
            color: white; 
            font-weight: bold; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.2s;
        }

        .naranja { background: #e67e22; }
        .amarillo { background: #f1c40f; color: #2c3e50; }
        .naranja-oscuro { background: #d35400; }
        .azul { background: #2980b9; }
        
        /* BOTÓN AUXILIO ESPECIAL (PULSANTE) */
        .rojo { 
            background: #d63031; 
            height: 90px; 
            font-size: 22px; 
            border-bottom: 5px solid #b71c1c; 
        }

        .pulsante { animation: pulse-red 2s infinite; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(214, 48, 49, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(214, 48, 49, 0); }
            100% { box-shadow: 0 0 0 0 rgba(214, 48, 49, 0); }
        }

        .oculto { display: none; }
        .footer-links { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .link-cambio { color: #1e3c72; cursor: pointer; font-weight: 600; font-size: 14px; text-decoration: underline; }
        
        /* ESTILO LEGAL */
        .legal-box { text-align: left; margin: 15px 0; font-size: 12px; color: #555; display: flex; align-items: flex-start; gap: 8px; }
        .legal-box input { width: auto; margin: 3px 0 0 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ SafeQuito</h2>
    <p class="subtitle">Comunidad Segura y Legal</p>

    <div id="seccion-login">
        <input type="text" id="login-cedula" placeholder="Cédula">
        <input type="password" id="login-pass" placeholder="Contraseña">
        <button class="principal" onclick="login()">INGRESAR</button>
        <div class="footer-links">
            <span class="link-cambio" onclick="mostrarRegistro()">¿Eres nuevo? Regístrate aquí</span>
        </div>
    </div>

    <div id="seccion-registro" class="oculto">
        <h3>Nuevo Registro</h3>
        <input type="text" id="reg-cedula" placeholder="Cédula">
        <input type="text" id="reg-nombres" placeholder="Nombres">
        <input type="text" id="reg-apellidos" placeholder="Apellidos">
        <input type="email" id="reg-correo" placeholder="Correo">
        <input type="tel" id="reg-celular" placeholder="Celular">
        <input type="password" id="reg-pass" placeholder="Contraseña">
        
        <div class="legal-box">
            <input type="checkbox" id="reg-legal">
            <label for="reg-legal">
                Acepto que mis datos personales y ubicación GPS sean usados exclusivamente para 
                <b>fines de seguridad comunitaria</b> según la ley vigente.
            </label>
        </div>

        <button class="principal" style="background: #27ae60;" onclick="registrar()">CREAR MI CUENTA</button>
        <div class="footer-links">
            <span class="link-cambio" onclick="mostrarLogin()">Ya tengo cuenta, volver</span>
        </div>
    </div>

    <div id="seccion-botones" class="oculto">
        <h3 id="bienvenida" style="color:#1e3c72; margin-bottom: 15px;"></h3>
        
        <button class="btn-alerta naranja" onclick="enviarAlerta('ROBO')">🔫 ROBO / ASALTO</button>
        <button class="btn-alerta amarillo" onclick="enviarAlerta('SOSPECHOSO')">👤 SOSPECHOSO</button>
        <button class="btn-alerta naranja-oscuro" onclick="enviarAlerta('INCENDIO')">🔥 INCENDIO</button>
        <button class="btn-alerta rojo pulsante" onclick="enviarAlerta('AUXILIO')">🚨 AUXILIO / EMERGENCIA</button>
        <button class="btn-alerta azul" onclick="enviarAlerta('ACCIDENTE')">🚑 ACCIDENTE</button>
        
        <div class="footer-links">
            <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer;">⬅️ Cerrar Sesión</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://servidor-safe-quito.onrender.com/api/v1"; 
    let usuarioCedula = "";

    function mostrarLogin() {
        document.getElementById('seccion-registro').classList.add('oculto');
        document.getElementById('seccion-login').classList.remove('oculto');
    }

    function mostrarRegistro() {
        document.getElementById('seccion-login').classList.add('oculto');
        document.getElementById('seccion-registro').classList.remove('oculto');
    }

    async function login() {
        const cedula = document.getElementById('login-cedula').value;
        const pass = document.getElementById('login-pass').value;

        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cedula: cedula, password: pass})
            });
            const result = await res.json();
            if (result.status === "ok") {
                usuarioCedula = cedula;
                document.getElementById('seccion-login').classList.add('oculto');
                document.getElementById('seccion-botones').classList.remove('oculto');
                document.getElementById('bienvenida').innerText = "Bienvenido, " + result.nombre;
            } else { alert("Datos incorrectos"); }
        } catch (e) { alert("Error al conectar con el servidor."); }
    }

    async function registrar() {
        // VALIDACIÓN LEGAL OBLIGATORIA
        if (!document.getElementById('reg-legal').checked) {
            return alert("Para registrarte debes aceptar el uso de datos para fines de seguridad.");
        }

        const datos = {
            cedula: document.getElementById('reg-cedula').value,
            nombres: document.getElementById('reg-nombres').value,
            apellidos: document.getElementById('reg-apellidos').value,
            correo: document.getElementById('reg-correo').value,
            celular: document.getElementById('reg-celular').value,
            password: document.getElementById('reg-pass').value
        };

        if(!datos.cedula || !datos.password) return alert("Por favor llena los campos principales.");

        try {
            const res = await fetch(`${API_URL}/registrar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });
            const result = await res.json();
            if (result.status === "ok") {
                alert("¡Registro completado con éxito!");
                mostrarLogin();
            } else { alert("Error: " + result.msj); }
        } catch (e) { alert("Error al registrar."); }
    }

    function enviarAlerta(tipo) {
        if (!navigator.geolocation) return alert("Por favor activa el GPS.");
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const gps = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            try {
                const res = await fetch(`${API_URL}/reportar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cedula: usuarioCedula, tipo: tipo, gps: gps})
                });
                if (res.ok) alert("🚨 Alerta de " + tipo + " enviada al sistema.");
            } catch (e) { alert("Error al enviar reporte."); }
        }, () => alert("Error: Debes permitir el GPS para reportar."));
    }
</script>
</body>
</html>
