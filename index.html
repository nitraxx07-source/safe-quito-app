<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeQuito - Seguridad Comunitaria</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            background-attachment: fixed;
            padding: 20px 0;
        }

        .container { 
            width: 95%; 
            max-width: 420px; 
            background: rgba(255, 255, 255, 0.98); 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 6px 0; 
            border: 1px solid #ccc; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 15px; 
        }

        .row { display: flex; gap: 10px; }

        button.principal { 
            width: 100%; 
            padding: 16px; 
            background: #1e3c72; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
        }

        /* DISEÑO DE ALERTAS */
        .btn-alerta { 
            width: 100%; 
            padding: 16px; 
            margin: 8px 0; 
            border: none; 
            border-radius: 15px; 
            color: white; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.2s;
        }

        /* BOTÓN DE AUXILIO EXTRA GRANDE Y PULSANTE */
        .btn-auxilio { 
            background: #d63031; 
            height: 110px; 
            font-size: 24px !important; 
            border-bottom: 6px solid #b71c1c; 
            margin-bottom: 20px;
            animation: pulso-rojo 2s infinite;
        }

        @keyframes pulso-rojo {
            0% { box-shadow: 0 0 0 0 rgba(214, 48, 49, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(214, 48, 49, 0); }
            100% { box-shadow: 0 0 0 0 rgba(214, 48, 49, 0); }
        }

        .btn-robo { background: #e67e22; }
        .btn-sospechoso { background: #f1c40f; color: #2c3e50; }
        .btn-incendio { background: #d35400; }
        .btn-accidente { background: #2980b9; }

        .legal-container { text-align: left; margin: 10px 0; padding: 10px; background: #eef2f7; border-radius: 8px; border-left: 5px solid #1e3c72; font-size: 11px; }
        .oculto { display: none; }
        .link-cambio { color: #1e3c72; cursor: pointer; font-weight: 600; font-size: 13px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ SafeQuito</h2>

    <div id="seccion-login">
        <input type="text" id="login-cedula" placeholder="Cédula" maxlength="10">
        <input type="password" id="login-pass" placeholder="Contraseña">
        <button class="principal" onclick="login()">INGRESAR</button>
        <div style="margin-top:15px;"><span class="link-cambio" onclick="mostrarRegistro()">¿Eres nuevo? Regístrate aquí</span></div>
    </div>

    <div id="seccion-registro" class="oculto">
        <h3 style="color: #27ae60; margin:0 0 10px 0;">Registro de Vecino</h3>
        <input type="text" id="reg-cedula" placeholder="Cédula (10 dígitos)" maxlength="10">
        <div class="row">
            <input type="text" id="reg-nombres" placeholder="Nombres">
            <input type="text" id="reg-apellidos" placeholder="Apellidos">
        </div>
        <input type="email" id="reg-correo" placeholder="Correo electrónico">
        <input type="tel" id="reg-celular" placeholder="Número Celular">
        
        <p style="text-align:left; font-size:12px; font-weight:bold; margin:10px 0 2px 0; color:#1e3c72;">UBICACIÓN:</p>
        <input type="text" id="reg-barrio" placeholder="Barrio / Sector">
        <input type="text" id="reg-principal" placeholder="Calle Principal">
        <div class="row">
            <input type="text" id="reg-secundaria" placeholder="Calle Secundaria">
            <input type="text" id="reg-casa" placeholder="N° Casa / Lote" style="width:120px;">
        </div>
        
        <input type="password" id="reg-pass" placeholder="Crear Contraseña">
        
        <div class="legal-container">
            <label style="display:flex; align-items:center; cursor:pointer;">
                <input type="checkbox" id="reg-legal" style="width:20px; margin-right:10px;">
                <span>Acepto términos y autorizo uso de datos y GPS para seguridad comunitaria conforme a la ley de Ecuador.</span>
            </label>
        </div>

        <button class="principal" style="background: #27ae60;" onclick="registrar()">REGISTRARME</button>
        <div style="margin-top:10px;"><span class="link-cambio" onclick="mostrarLogin()">Volver al ingreso</span></div>
    </div>

    <div id="seccion-botones" class="oculto">
        <h3 id="bienvenida" style="color:#1e3c72; margin:0 0 10px 0;"></h3>
        
        <button class="btn-alerta btn-auxilio" onclick="enviarAlerta('AUXILIO')">🚨 AUXILIO EMERGENCIA</button>
        
        <button class="btn-alerta btn-robo" onclick="enviarAlerta('ROBO')">🔫 ROBO</button>
        <button class="btn-alerta btn-sospechoso" onclick="enviarAlerta('SOSPECHOSO')">👤 PERSONA / AUTO SOSPECHOSO</button>
        <button class="btn-alerta btn-incendio" onclick="enviarAlerta('INCENDIO')">🔥 INCENDIO</button>
        <button class="btn-alerta btn-accidente" onclick="enviarAlerta('ACCIDENTE')">🚑 ACCIDENTE</button>
        
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
            <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer;">Cerrar Sesión</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://servidor-safe-quito.onrender.com/api/v1"; 
    let usuarioCedula = "";

    function mostrarLogin() { document.getElementById('seccion-registro').classList.add('oculto'); document.getElementById('seccion-login').classList.remove('oculto'); }
    function mostrarRegistro() { document.getElementById('seccion-login').classList.add('oculto'); document.getElementById('seccion-registro').classList.remove('oculto'); }

    async function login() {
        const btn = document.querySelector("#seccion-login .principal");
        const cedula = document.getElementById('login-cedula').value;
        const pass = document.getElementById('login-pass').value;
        if(!cedula || !pass) return alert("Llena tus datos.");
        btn.innerText = "⏳ INGRESANDO..."; btn.disabled = true;
        try {
            const res = await fetch(`${API_URL}/login`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cedula, password: pass}) });
            const result = await res.json();
            if (result.status === "ok") {
                usuarioCedula = cedula;
                document.getElementById('seccion-login').classList.add('oculto');
                document.getElementById('seccion-botones').classList.remove('oculto');
                document.getElementById('bienvenida').innerText = "Hola, " + result.nombre;
            } else { alert("Datos incorrectos."); }
        } catch (e) { alert("Servidor despertando... reintenta en 10 seg."); } finally { btn.innerText = "INGRESAR"; btn.disabled = false; }
    }

    async function registrar() {
        if (!document.getElementById('reg-legal').checked) return alert("Acepta los términos.");
        const datos = {
            cedula: document.getElementById('reg-cedula').value,
            nombres: document.getElementById('reg-nombres').value,
            apellidos: document.getElementById('reg-apellidos').value,
            correo: document.getElementById('reg-correo').value,
            celular: document.getElementById('reg-celular').value,
            barrio: document.getElementById('reg-barrio').value,
            calle_principal: document.getElementById('reg-principal').value,
            calle_secundaria: document.getElementById('reg-secundaria').value,
            numero_casa: document.getElementById('reg-casa').value,
            password: document.getElementById('reg-pass').value
        };
        if(datos.cedula.length !== 10) return alert("Cédula inválida.");
        try {
            const res = await fetch(`${API_URL}/registrar`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(datos) });
            const result = await res.json();
            if (result.status === "ok") { alert("¡Bienvenido! Ya puedes ingresar."); mostrarLogin(); }
            else { alert("Error: " + result.msj); }
        } catch (e) { alert("Error al conectar."); }
    }

    function enviarAlerta(tipo) {
        if (!navigator.geolocation) return alert("Activa el GPS.");
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const gps = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            try {
                await fetch(`${API_URL}/reportar`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({cedula: usuarioCedula, tipo, gps}) });
                alert("✅ Alerta de " + tipo + " enviada con éxito.");
            } catch (e) { alert("Error al enviar reporte."); }
        }, () => alert("Se requiere GPS para la alerta."));
    }
</script>
</body>
</html>
