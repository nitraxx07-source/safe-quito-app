<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeQuito - Acceso</title>
    <style>
        /* FONDO PREDISEÑADO: Degradado moderno de seguridad */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); /* Azul Seguridad */
            background-attachment: fixed;
        }

        .container { 
            width: 90%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            text-align: center;
        }

        h2 { color: #1e3c72; margin-bottom: 5px; font-size: 28px; }
        p.subtitle { color: #555; margin-bottom: 30px; font-size: 14px; font-weight: 500; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ccc; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            background: #f9f9f9;
        }

        button.principal { 
            width: 100%; 
            padding: 16px; 
            background: #1e3c72; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px;
            transition: 0.3s;
        }

        button.principal:hover { background: #2a5298; transform: translateY(-2px); }

        /* Botones de Alerta */
        .btn-alerta { width: 100%; padding: 22px; margin: 12px 0; border: none; border-radius: 15px; color: white; font-weight: bold; font-size: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .rojo { background: #d63031; border-bottom: 5px solid #b71c1c; }
        .naranja { background: #e67e22; }
        .azul { background: #0984e3; }

        .oculto { display: none; }
        
        .footer-links { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .link-cambio { color: #1e3c72; cursor: pointer; font-weight: 600; text-decoration: none; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ SafeQuito</h2>
    <p class="subtitle">Comunidad Protegida</p>

    <div id="seccion-login">
        <input type="text" id="login-cedula" placeholder="Tu Cédula">
        <input type="password" id="login-pass" placeholder="Tu Contraseña">
        <button class="principal" onclick="login()">INGRESAR</button>
        
        <div class="footer-links">
            <span class="link-cambio" onclick="mostrarRegistro()">¿No tienes cuenta? Regístrate aquí</span>
        </div>
    </div>

    <div id="seccion-registro" class="oculto">
        <h3>Nuevo Vecino</h3>
        <input type="text" id="reg-cedula" placeholder="Cédula">
        <input type="text" id="reg-nombres" placeholder="Nombres">
        <input type="text" id="reg-apellidos" placeholder="Apellidos">
        <input type="email" id="reg-correo" placeholder="Correo">
        <input type="tel" id="reg-celular" placeholder="Celular">
        <input type="password" id="reg-pass" placeholder="Contraseña">
        <button class="principal" style="background: #27ae60;" onclick="registrar()">CREAR CUENTA</button>
        
        <div class="footer-links">
            <span class="link-cambio" onclick="mostrarLogin()">Ya tengo cuenta, volver</span>
        </div>
    </div>

    <div id="seccion-botones" class="oculto">
        <h3 id="bienvenida" style="color:#1e3c72"></h3>
        <button class="btn-alerta rojo" onclick="enviarAlerta('AUXILIO')">🚨 AUXILIO</button>
        <button class="btn-alerta naranja" onclick="enviarAlerta('ROBO')">🔫 ROBO / ASALTO</button>
        <button class="btn-alerta azul" onclick="enviarAlerta('ACCIDENTE')">🚑 ACCIDENTE</button>
        <hr>
        <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer;">Salir</button>
    </div>
</div>

<script>
    const API_URL = "https://servidor-safe-quito.onrender.com/api/v1"; 
    let usuarioCedula = "";

    function mostrarLogin() {
        document.getElementById('seccion-registro').classList.add('oculto');
        document.getElementById('seccion-login').classList.remove('oculto');
    }

    function mostrarRegistro() {
        document.getElementById('seccion-login').classList.add('oculto');
        document.getElementById('seccion-registro').classList.remove('oculto');
    }

    async function login() {
        const cedula = document.getElementById('login-cedula').value;
        const pass = document.getElementById('login-pass').value;

        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cedula: cedula, password: pass})
            });
            const result = await res.json();
            if (result.status === "ok") {
                usuarioCedula = cedula;
                document.getElementById('seccion-login').classList.add('oculto');
                document.getElementById('seccion-botones').classList.remove('oculto');
                document.getElementById('bienvenida').innerText = "Hola, " + result.nombre;
            } else { alert("Cédula o contraseña incorrecta"); }
        } catch (e) { alert("Error al conectar con SafeQuito"); }
    }

    async function registrar() {
        const datos = {
            cedula: document.getElementById('reg-cedula').value,
            nombres: document.getElementById('reg-nombres').value,
            apellidos: document.getElementById('reg-apellidos').value,
            correo: document.getElementById('reg-correo').value,
            celular: document.getElementById('reg-celular').value,
            password: document.getElementById('reg-pass').value
        };

        const res = await fetch(`${API_URL}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(datos)
        });
        const result = await res.json();
        if (result.status === "ok") {
            alert("¡Registro exitoso!");
            mostrarLogin();
        } else { alert("Error: " + result.msj); }
    }

    function enviarAlerta(tipo) {
        if (!navigator.geolocation) return alert("Activa el GPS");
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const gps = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            const res = await fetch(`${API_URL}/reportar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cedula: usuarioCedula, tipo: tipo, gps: gps})
            });
            if (res.ok) alert("✅ Alerta enviada.");
        });
    }
</script>
</body>
</html>
