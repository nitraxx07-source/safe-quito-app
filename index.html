<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeQuito - Seguridad</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            background-attachment: fixed;
            padding: 20px 0;
        }

        .container { 
            width: 90%; 
            max-width: 400px; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            text-align: center; 
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #ccc; 
            border-radius: 10px; 
            box-sizing: border-box; 
        }

        button.principal { 
            width: 100%; 
            padding: 15px; 
            background: #1e3c72; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-alerta { 
            width: 100%; 
            padding: 18px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 15px; 
            color: white; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
        }

        .btn-auxilio { 
            background: #d63031; 
            height: 100px; 
            font-size: 22px !important; 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .btn-robo { background: #e67e22; }
        .btn-sospechoso { background: #f1c40f; color: #2c3e50; }
        .btn-incendio { background: #d35400; }
        .btn-accidente { background: #2980b9; }

        .oculto { display: none; }
        .link { color: #1e3c72; cursor: pointer; display: block; margin-top: 15px; font-size: 14px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#1e3c72;">🛡️ SafeQuito</h2>

    <div id="seccion-login">
        <input type="text" id="login-cedula" placeholder="Cédula" maxlength="10">
        <input type="password" id="login-pass" placeholder="Contraseña">
        <button class="principal" onclick="login()">INGRESAR</button>
        <span class="link" onclick="mostrarRegistro()">¿Eres nuevo? Regístrate</span>
    </div>

    <div id="seccion-registro" class="oculto">
        <h3>Registro</h3>
        <input type="text" id="reg-cedula" placeholder="Cédula" maxlength="10">
        <input type="text" id="reg-nombres" placeholder="Nombres">
        <input type="text" id="reg-apellidos" placeholder="Apellidos">
        <input type="text" id="reg-barrio" placeholder="Barrio">
        <input type="password" id="reg-pass" placeholder="Contraseña">
        <button class="principal" style="background:#27ae60" onclick="registrar()">REGISTRARME</button>
        <span class="link" onclick="mostrarLogin()">Volver</span>
    </div>

    <div id="seccion-botones" class="oculto">
        <h4 id="bienvenida"></h4>
        <button class="btn-alerta btn-auxilio" onclick="enviarAlerta('AUXILIO')">🚨 AUXILIO</button>
        <button class="btn-alerta btn-robo" onclick="enviarAlerta('ROBO')">🔫 ROBO</button>
        <button class="btn-alerta btn-sospechoso" onclick="enviarAlerta('SOSPECHOSO')">👤 SOSPECHOSO</button>
        <button class="btn-alerta btn-incendio" onclick="enviarAlerta('INCENDIO')">🔥 INCENDIO</button>
        <button class="btn-alerta btn-accidente" onclick="enviarAlerta('ACCIDENTE')">🚑 ACCIDENTE</button>
    </div>
</div>

<script>
    const API_URL = "https://servidor-safe-quito.onrender.com/api/v1";
    let cedulaGlobal = "";

    function mostrarRegistro() {
        document.getElementById('seccion-login').className = 'oculto';
        document.getElementById('seccion-registro').className = '';
    }

    function mostrarLogin() {
        document.getElementById('seccion-registro').className = 'oculto';
        document.getElementById('seccion-login').className = '';
    }

    async function login() {
        const cedula = document.getElementById('login-cedula').value;
        const pass = document.getElementById('login-pass').value;
        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cedula, password: pass})
            });
            const data = await res.json();
            if (data.status === "ok") {
                cedulaGlobal = cedula;
                document.getElementById('seccion-login').className = 'oculto';
                document.getElementById('seccion-botones').className = '';
                document.getElementById('bienvenida').innerText = "Hola, " + data.nombre;
            } else { alert("Datos incorrectos"); }
        } catch (e) { alert("Error de conexión"); }
    }

    async function registrar() {
        const datos = {
            cedula: document.getElementById('reg-cedula').value,
            nombres: document.getElementById('reg-nombres').value,
            apellidos: document.getElementById('reg-apellidos').value,
            barrio: document.getElementById('reg-barrio').value,
            password: document.getElementById('reg-pass').value
        };
        try {
            const res = await fetch(`${API_URL}/registrar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });
            if (res.ok) { alert("¡Éxito! Ya puedes entrar."); mostrarLogin(); }
        } catch (e) { alert("Error al registrar"); }
    }

    function enviarAlerta(tipo) {
        if (!confirm("¿Enviar alerta de " + tipo + "?")) return;
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const gps = `${pos.coords.latitude},${pos.coords.longitude}`;
            try {
                await fetch(`${API_URL}/reportar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cedula: cedulaGlobal, tipo, gps})
                });
                alert("✅ Alerta enviada");
            } catch (e) { alert("Error al enviar"); }
        }, () => alert("Activa el GPS"));
    }
</script>
</body>
</html>
