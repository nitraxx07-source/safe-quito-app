<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeQuito - Alerta Barrial 🛡️</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #d9534f; }
        p { color: #555; }
        .btn-panic {
            background-color: #d9534f; color: white; border: none; padding: 20px 40px;
            font-size: 20px; font-weight: bold; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 15px rgba(217, 83, 79, 0.6); transition: 0.3s; width: 150px; height: 150px;
        }
        .btn-panic:active { transform: scale(0.9); background-color: #c9302c; }
        #status { margin-top: 20px; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
        .success { background-color: #dff0d8; color: #3c763d; display: block !important; }
        .error { background-color: #f2dede; color: #a94442; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>SafeQuito 🛡️</h1>
    <p>Presiona el botón en caso de emergencia en el barrio.</p>
    
    <button class="btn-panic" onclick="enviarAlerta()">🚨<br>ALERTA</button>

    <div id="status"></div>
</div>

<script>
    // --- ESTA ES LA URL DE TU SERVIDOR EN RENDER ---
    const API_URL = "https://servidor-safe-quito.onrender.com/api/v1/reportar";

    function enviarAlerta() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "📍 Obteniendo ubicación...";
        statusDiv.className = "";

        if (!navigator.geolocation) {
            statusDiv.innerText = "❌ Tu navegador no soporta GPS.";
            statusDiv.className = "error";
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const gpsString = `${lat},${lon}`;

                statusDiv.innerText = "📡 Enviando alerta a la nube...";

                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        cedula_vecino: "Vecino-Quito",
                        gps: gpsString,
                        direccion: "Alerta desde Celular"
                    })
                })
                .then(response => {
                    if (response.ok) {
                        statusDiv.innerText = "✅ ¡ALERTA ENVIADA CON ÉXITO! La ayuda está en camino.";
                        statusDiv.className = "success";
                        // Vibración del celular (si el dispositivo lo permite)
                        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    } else {
                        throw new Error("Error en el servidor");
                    }
                })
                .catch(error => {
                    statusDiv.innerText = "❌ Error en el servidor Render. Revisa tus Logs.";
                    statusDiv.className = "error";
                    console.error(error);
                });
            },
            (err) => {
                statusDiv.innerText = "❌ Error: Debes activar el GPS y dar permiso.";
                statusDiv.className = "error";
            }
        );
    }
</script>

</body>
</html>
