<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeQuito - Seguridad Comunitaria</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            background-attachment: fixed;
            padding: 20px 0;
        }

        .container { 
            width: 90%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.98); 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center;
            display: flex;
            flex-direction: column;
            height: auto;
        }

        h2 { color: #1e3c72; margin-bottom: 5px; font-size: 28px; }
        p.subtitle { color: #555; margin-bottom: 25px; font-size: 14px; font-weight: 500; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border: 1px solid #ccc; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px;
            background: #fdfdfd;
        }

        button.principal { 
            width: 100%; 
            padding: 16px; 
            background: #1e3c72; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px;
            transition: 0.3s;
        }

        /* DISEÑO LEGAL SOLICITADO */
        .legal-container {
            text-align: left; 
            margin: 15px 0; 
            padding: 15px; 
            background: #eef2f7; 
            border-radius: 10px; 
            border-left: 5px solid #1e3c72;
        }

        .legal-label {
            display: flex; 
            align-items: flex-start; 
            cursor: pointer; 
            font-size: 12px; 
            color: #2f3640;
            line-height: 1.4;
        }

        .legal-label input {
            width: 22px; 
            height: 22px; 
            margin-right: 12px; 
            margin-top: 0;
            flex-shrink: 0;
        }

        .btn-alerta { width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 15px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .naranja { background: #e67e22; }
        .amarillo { background: #f1c40f; color: #2c3e50; }
        .naranja-oscuro { background: #d35400; }
        .azul { background: #2980b9; }
        .rojo { background: #d63031; height: 90px; font-size: 22px; border-bottom: 5px solid #b71c1c; }
        .pulsante { animation: pulse-red 2s infinite; }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(214, 48, 49, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(214, 48, 49, 0); }
            100% { box-shadow: 0 0 0 0 rgba(214, 48, 49, 0); }
        }

        .oculto { display: none; }
        .footer-links { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .link-cambio { color: #1e3c72; cursor: pointer; font-weight: 600; font-size: 14px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ SafeQuito</h2>
    <p class="subtitle">Comunidad Organizada</p>

    <div id="seccion-login">
        <input type="text" id="login-cedula" placeholder="Tu Cédula" maxlength="10">
        <input type="password" id="login-pass" placeholder="Tu Contraseña">
        <button class="principal" onclick="login()">INGRESAR</button>
        <div class="footer-links">
            <span class="link-cambio" onclick="mostrarRegistro()">¿Eres nuevo? Regístrate aquí</span>
        </div>
    </div>

    <div id="seccion-registro" class="oculto">
        <h3 style="color: #27ae60; margin-top:0;">Nuevo Vecino</h3>
        <input type="text" id="reg-cedula" placeholder="Cédula (10 dígitos)" maxlength="10">
        <input type="text" id="reg-nombres" placeholder="Nombres">
        <input type="text" id="reg-apellidos" placeholder="Apellidos">
        <input type="email" id="reg-correo" placeholder="Correo electrónico">
        <input type="tel" id="reg-celular" placeholder="Número Celular">
        <input type="password" id="reg-pass" placeholder="Crear Contraseña">
        
        <div class="legal-container">
            <label class="legal-label">
                <input type="checkbox" id="reg-legal">
                <span>Al marcar esta casilla, declaro que <b>acepto los términos y condiciones de uso</b>. Así como autorizo el tratamiento de mis datos personales y ubicación geográfica (GPS) conforme a la ley de Ecuador, con el fin exclusivo de gestionar alertas de seguridad y auxilio comunitario.</span>
            </label>
        </div>

        <button class="principal" style="background: #27ae60;" onclick="registrar()">CREAR CUENTA</button>
        <div class="footer-links">
            <span class="link-cambio" onclick="mostrarLogin()">Ya tengo cuenta, volver</span>
        </div>
    </div>

    <div id="seccion-botones" class="oculto">
        <h3 id="bienvenida" style="color:#1e3c72; margin:0 0 15px 0;"></h3>
        <button class="btn-alerta naranja" onclick="enviarAlerta('ROBO')">🔫 ROBO / ASALTO</button>
        <button class="btn-alerta amarillo" onclick="enviarAlerta('SOSPECHOSO')">👤 SOSPECHOSO</button>
        <button class="btn-alerta naranja-oscuro" onclick="enviarAlerta('INCENDIO')">🔥 INCENDIO</button>
        <button class="btn-alerta rojo pulsante" onclick="enviarAlerta('AUXILIO')">🚨 AUXILIO / EMERGENCIA</button>
        <button class="btn-alerta azul" onclick="enviarAlerta('ACCIDENTE')">🚑 ACCIDENTE</button>
        <div class="footer-links">
            <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer;">⬅️ Cerrar Sesión</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://servidor-safe-quito.onrender.com/api/v1"; 
    let usuarioCedula = "";

    function mostrarLogin() {
        document.getElementById('seccion-registro').classList.add('oculto');
        document.getElementById('seccion-login').classList.remove('oculto');
    }

    function mostrarRegistro() {
        document.getElementById('seccion-login').classList.add('oculto');
        document.getElementById('seccion-registro').classList.remove('oculto');
    }

    async function login() {
        const cedula = document.getElementById('login-cedula').value;
        const pass = document.getElementById('login-pass').value;
        try {
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cedula: cedula, password: pass})
            });
            const result = await res.json();
            if (result.status === "ok") {
                usuarioCedula = cedula;
                document.getElementById('seccion-login').classList.add('oculto');
                document.getElementById('seccion-botones').classList.remove('oculto');
                document.getElementById('bienvenida').innerText = "Hola, " + result.nombre;
            } else { alert("Datos incorrectos"); }
        } catch (e) { alert("Error de conexión"); }
    }

    async function registrar() {
        if (!document.getElementById('reg-legal').checked) {
            return alert("Debes aceptar los términos y condiciones para continuar.");
        }
        
        const datos = {
            cedula: document.getElementById('reg-cedula').value,
            nombres: document.getElementById('reg-nombres').value,
            apellidos: document.getElementById('reg-apellidos').value,
            correo: document.getElementById('reg-correo').value,
            celular: document.getElementById('reg-celular').value,
            password: document.getElementById('reg-pass').value
        };

        if(datos.cedula.length !== 10) return alert("La cédula debe tener 10 dígitos.");

        try {
            const res = await fetch(`${API_URL}/registrar`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(datos)
            });
            const result = await res.json();
            if (result.status === "ok") {
                alert("¡Registro exitoso! Bienvenido al sistema.");
                mostrarLogin();
            } else { alert("Error: " + result.msj); }
        } catch (e) { alert("Error al registrar vecino."); }
    }

    function enviarAlerta(tipo) {
        if (!navigator.geolocation) return alert("Activa el GPS.");
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const gps = `${pos.coords.latitude}, ${pos.coords.longitude}`;
            try {
                const res = await fetch(`${API_URL}/reportar`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({cedula: usuarioCedula, tipo: tipo, gps: gps})
                });
                if (res.ok) alert("✅ Alerta de " + tipo + " enviada.");
            } catch (e) { alert("Error al enviar reporte."); }
        }, () => alert("Se requiere GPS para enviar la alerta."));
    }
</script>
</body>
</html>
