<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeQuito - Seguridad Comunitaria</title>
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            background-attachment: fixed;
            padding: 20px 0;
            -webkit-tap-highlight-color: transparent;
        }

        .container { 
            width: 90%; 
            max-width: 400px; 
            background: rgba(255, 255, 255, 0.98); 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            text-align: center; 
        }

        h2 { color: #1e3c72; margin-bottom: 20px; font-size: 28px; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            border: 1.5px solid #ddd; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: 0.3s;
        }

        input:focus { border-color: #1e3c72; outline: none; box-shadow: 0 0 8px rgba(30,60,114,0.2); }

        .row { display: flex; gap: 10px; }

        button.principal { 
            width: 100%; 
            padding: 16px; 
            background: #1e3c72; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* BOTONES DE ALERTA */
        .btn-alerta { 
            width: 100%; 
            padding: 18px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 18px; 
            color: white; 
            font-weight: bold; 
            font-size: 17px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s;
        }

        .btn-alerta:active { transform: scale(0.96); }

        /* BOTÓN AUXILIO EXTRA GRANDE */
        .btn-auxilio { 
            background: #d63031; 
            min-height: 120px; 
            font-size: 26px !important; 
            border-bottom: 8px solid #b71c1c; 
            margin-bottom: 25px;
            animation: pulso-rojo 1.5s infinite;
        }

        @keyframes pulso-rojo {
            0% { box-shadow: 0 0 0 0 rgba(214, 48, 49, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(214, 48, 49, 0); }
