<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeQuito - Seguridad Barrial</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        
        /* Botones de Alerta */
        .btn-alerta { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-alerta:active { transform: scale(0.95); }
        
        .rojo { background-color: #d32f2f; height: 100px; font-size: 24px; } /* AUXILIO */
        .naranja { background-color: #f57c00; } /* ROBO */
        .amarillo { background-color: #fbc02d; color: #333; } /* SOSPECHOSO */
        .naranja-oscuro { background-color: #e64a19; } /* INCENDIO */
        .azul { background-color: #1976d2; } /* ACCIDENTE */
        
        .oculto { display: none; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛡️ SafeQuito</h2>

    <div id="seccion-registro">
        <h3>Registro de Vecino</h3>
        <input type="text" id="reg-cedula" placeholder="Cédula">
        <input type="text" id="reg-nombres" placeholder="Nombres y Apellidos">
        <input type="email" id="reg-correo" placeholder="Correo electrónico">
        <input type="tel" id="reg-celular" placeholder="Celular">
        <input type="password" id="reg-pass" placeholder="Crear Contraseña">
        <button onclick="registrar()">Registrarse</button>
        <p>¿Ya tienes cuenta? <a href="#" onclick="mostrarLogin()">Inicia Sesión</a></p>
    </div>

    <div id="seccion-login" class="oculto">
        <h3>Iniciar Sesión</h3>
        <input type="text" id="login-cedula" placeholder="Cédula">
        <input type="password" id="login-pass" placeholder="Contraseña">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="seccion-botones" class="oculto">
        <p id="bienvenida"></p>
        <button class="btn-alerta rojo" onclick="enviarAlerta('AUXILIO')">🚨 AUXILIO</button>
        <button class="btn-alerta naranja" onclick="enviarAlerta('ROBO')">🔫 ROBO</button>
        <button class="btn-alerta amarillo" onclick="enviarAlerta('SOSPECHOSO')">👤 PERSONA SOSPECHOSA</button>
        <button class="btn-alerta naranja-oscuro" onclick="enviarAlerta('INCENDIO')">🔥 INCENDIO</button>
        <button class="btn-alerta azul" onclick="enviarAlerta('ACCIDENTE')">🚑 ACCIDENTE</button>
        <br><br>
        <button onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
</div>

<script>
    const API_URL = "TU_URL_DE_RENDER/api/v1"; // Reemplázalo por tu link de Render

    function mostrarLogin() {
        document.getElementById('seccion-registro').classList.add('oculto');
        document.getElementById('seccion-login').classList.remove('oculto');
    }

    // Aquí irán las funciones de registrar(), login() y enviarAlerta()
    // que conectaremos con tu servidor de Render.
</script>

</body>
</html>
